[workspace]
channels = ["conda-forge"]
name = "群策"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
pm2-install = { cmd = "pnpm install", cwd = "." }
console-install = { cmd = "pnpm install", cwd = "console" }
console-dev = { cmd = "pnpm dev -- --host 0.0.0.0 --port 5173", cwd = "console" }
console-build = { cmd = "pnpm build", cwd = "console" }
server = { cmd = "sh -lc 'pnpm exec pm2 describe qunce-server >/dev/null 2>&1 && pnpm exec pm2 restart pm2.config.cjs --only qunce-server || pnpm exec pm2 start pm2.config.cjs --only qunce-server'", cwd = ".", depends-on = ["pm2-install", "console-install", "console-build"] }
server-stop = { cmd = "pnpm exec pm2 delete qunce-server", cwd = "." }
server-status = { cmd = "pnpm exec pm2 status qunce-server", cwd = "." }
agent-run = { cmd = "CGO_ENABLED=0 go run ./cmd/agentd 127.0.0.1:8000", cwd = "agent" }
agent-build = { cmd = "mkdir -p ./bin && CGO_ENABLED=0 go build -o ./bin/agentd ./cmd/agentd", cwd = "agent" }

[dependencies]
python = "3.12.*"
nodejs = "22.*"
pnpm = "*"
go = ">=1.26.1,<2"

[pypi-dependencies]
flask = "*"
flask-sock = "*"
sqlalchemy = "*"
alembic = "*"
pydantic-settings = "*"
